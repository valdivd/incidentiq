spring:
  application:
    name: incidentiq

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/incidentiq}
    username: ${DATABASE_USER:incidentiq}
    password: ${DATABASE_PASSWORD:incidentiq}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  error:
    include-message: never

ai:
  anthropic:
    api-key: ${AI_API_KEY}
    model: ${AI_MODEL:claude-haiku-4-5-20251001}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized
